<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 自动书签生成工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }
.container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
.card { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }
h3 { font-size: 15px; margin-bottom: 10px; color: #555; }

/* Upload */
.upload-zone { border: 2px dashed #d0d5dd; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafbfc; }
.upload-zone:hover { border-color: #4f8cff; background: #f0f5ff; }
.upload-zone.dragover { border-color: #4f8cff; background: #e8f0fe; }
.upload-zone p { color: #888; font-size: 14px; }
.upload-zone .icon { font-size: 40px; margin-bottom: 10px; }
.file-info { display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 10px; background: #f0f5ff; border-radius: 8px; }
.file-info .name { flex: 1; font-weight: 500; }
.file-info button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 18px; }

/* Form */
.form-row { display: flex; gap: 15px; margin-bottom: 15px; }
.form-row > div { flex: 1; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 500; }
input, select { width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
input:focus, select:focus { outline: none; border-color: #4f8cff; box-shadow: 0 0 0 3px rgba(79,140,255,0.1); }
.radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
.radio-group label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 8px; transition: all 0.2s; }
.radio-group input[type=radio] { width: auto; }
.radio-group label:has(input:checked) { border-color: #4f8cff; background: #f0f5ff; }

/* Button */
.btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { width: 100%; background: #4f8cff; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #3a6fd8; }
.btn-primary:disabled { background: #c0c8d8; cursor: not-allowed; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }

/* Progress */
.progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin: 15px 0; }
.progress { height: 100%; background: #4f8cff; transition: width 0.3s; border-radius: 3px; }

/* Log */
.log { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 15px; font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; max-height: 250px; overflow-y: auto; line-height: 1.6; }
.log .error { color: #f38ba8; }
.log .success { color: #a6e3a1; }

/* Collapsible */
.collapse-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px 0; }
.collapse-header .arrow { transition: transform 0.2s; }
.collapse-header.open .arrow { transform: rotate(180deg); }
.collapse-body { display: none; }
.collapse-body.open { display: block; }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; margin-bottom:5px;">📑 PDF 自动书签生成工具</h2>
    <p style="text-align:center; color:#888; font-size:13px; margin-bottom:25px;">上传 PDF → 自动识别目录 → 生成书签</p>

    <!-- 上传区域 -->
    <div class="card">
        <div id="uploadZone" class="upload-zone">
            <div class="icon">📄</div>
            <p>点击或拖拽 PDF 文件到此处</p>
            <input type="file" id="fileInput" accept=".pdf" style="display:none">
        </div>
        <div id="fileInfo" class="file-info hidden">
            <span>📄</span>
            <span class="name" id="fileName"></span>
            <button onclick="removeFile()" title="移除">✕</button>
        </div>
    </div>

    <!-- 参数设置 -->
    <div class="card" id="paramsCard">
        <h3>目录页参数</h3>
        <div class="form-row">
            <div><label>目录开始页</label><input type="number" id="tocStart" min="1" value="1"></div>
            <div><label>目录结束页</label><input type="number" id="tocEnd" min="1" value="2"></div>
            <div><label>正文偏移量</label><input type="number" id="offset" value="0"></div>
        </div>
        <h3>识别方式</h3>
        <div class="radio-group">
            <label><input type="radio" name="tocType" value="normal" checked> 自动（文本+LLM）</label>
            <label><input type="radio" name="tocType" value="image"> 图片模式（视觉LLM）</label>
        </div>
    </div>

    <!-- 开始按钮 -->
    <button class="btn btn-primary" id="startBtn" disabled onclick="startProcess()">▶ 开始生成书签</button>
    <button class="btn" id="resetBtn" style="background:#8b5cf6; color:#fff; width:100%; margin-top:8px;" onclick="resetAll()">↻ 重置进程</button>

    <!-- 进度和日志 -->
    <div class="card hidden" id="resultCard">
        <div class="progress-bar"><div class="progress" id="progressBar" style="width:0%"></div></div>
        <div class="log" id="logBox"></div>
        <div style="text-align:center; margin-top:15px;">
            <button class="btn" id="stopBtn" style="background:#ef4444; color:#fff; margin-right:10px; display:none;" onclick="stopProcess()">⏹ 终止</button>
            <button class="btn btn-success hidden" id="downloadBtn" onclick="downloadResult()">⬇ 下载带书签的 PDF</button>
        </div>
    </div>

    <!-- 配置 -->
    <div class="card" style="margin-top:20px;">
        <h3 style="margin-bottom:12px;">⚙ 文本模型</h3>
        <div class="form-row">
            <div><label>API Base URL</label><input type="text" id="cfgUrl" placeholder="https://api.deepseek.com/v1"></div>
            <div><label>API Key <span id="keyStatus" style="font-weight:normal;color:#888;font-size:11px;"></span></label><input type="password" id="cfgKey" placeholder="留空保持不变"></div>
        </div>
        <div class="form-row">
            <div><label>模型名称</label><input type="text" id="cfgModel" placeholder="deepseek-chat"></div>
        </div>
        <button class="btn" id="btnTestText" style="background:#10b981; color:#fff; margin-top:5px; padding:6px 14px; font-size:13px;" onclick="testLLM('text')">测试文本模型</button>
        <span id="testResultText" style="margin-left:10px; font-size:13px;"></span>

        <h3 style="margin:18px 0 12px 0;">🖼 视觉模型（留空则与文本模型相同）</h3>
        <div class="form-row">
            <div><label>API Base URL</label><input type="text" id="cfgVisionUrl" placeholder="与文本模型相同"></div>
            <div><label>API Key <span id="visionKeyStatus" style="font-weight:normal;color:#888;font-size:11px;"></span></label><input type="password" id="cfgVisionKey" placeholder="留空保持不变"></div>
        </div>
        <div class="form-row">
            <div><label>模型名称</label><input type="text" id="cfgVision" placeholder="gpt-4o"></div>
        </div>
        <button class="btn" id="btnTestVision" style="background:#f59e0b; color:#fff; margin-top:5px; padding:6px 14px; font-size:13px;" onclick="testLLM('vision')">测试视觉模型</button>
        <span id="testResultVision" style="margin-left:10px; font-size:13px;"></span>
        <br>
        <button class="btn" style="background:#6366f1; color:#fff; margin-top:12px;" onclick="saveConfig()">保存配置</button>
    </div>
</div>

<script>
let sessionId = null;
let eventSource = null;

// Upload
document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('uploadZone').ondragover = (e) => { e.preventDefault(); e.target.classList.add('dragover'); };
document.getElementById('uploadZone').ondragleave = (e) => { e.target.classList.remove('dragover'); };
document.getElementById('uploadZone').ondrop = (e) => {
    e.preventDefault();
    e.target.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
};
document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (file) uploadFile(file);
};

function uploadFile(file) {
    const form = new FormData();
    form.append('pdf', file);
    fetch('/api/upload', { method: 'POST', body: form })
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert(data.error); return; }
            sessionId = data.session_id;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('uploadZone').classList.add('hidden');
            document.getElementById('fileInfo').classList.remove('hidden');
            document.getElementById('startBtn').disabled = false;
        });
}

function removeFile() {
    sessionId = null;
    document.getElementById('uploadZone').classList.remove('hidden');
    document.getElementById('fileInfo').classList.add('hidden');
    document.getElementById('startBtn').disabled = true;
}

function startProcess() {
    const tocStart = document.getElementById('tocStart').value;
    const tocEnd = document.getElementById('tocEnd').value;
    const offset = document.getElementById('offset').value;
    const tocType = document.querySelector('input[name="tocType"]:checked').value;

    document.getElementById('startBtn').disabled = true;
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('downloadBtn').classList.add('hidden');
    document.getElementById('logBox').innerHTML = '';
    document.getElementById('progressBar').style.width = '0%';

    const params = { session_id: sessionId, toc_type: tocType, toc_start: tocStart, toc_end: tocEnd, offset: offset };
    fetch('/api/process', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) })
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert(data.error); document.getElementById('startBtn').disabled = false; return; }
            startLogStream();
        });
}

function startLogStream() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/log');
    let step = 0;
    eventSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const text = data.text;
        const logBox = document.getElementById('logBox');

        if (text.includes('RESULT_PATH:')) {
            document.getElementById('downloadBtn').classList.remove('hidden');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('startBtn').disabled = false;
            eventSource.close();
            return;
        }
        if (text.includes('ERROR:NO_ENTRIES')) {
            document.getElementById('startBtn').disabled = false;
            eventSource.close();
        }

        const line = document.createElement('div');
        if (text.includes('[错误]')) line.className = 'error';
        else if (text.includes('成功') || text.includes('完成')) line.className = 'success';
        line.textContent = text;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;

        if (text.includes('[1/4]')) step = 25;
        else if (text.includes('[2/4]')) step = 50;
        else if (text.includes('[3/4]')) step = 75;
        else if (text.includes('[4/4]')) step = 100;
        document.getElementById('progressBar').style.width = step + '%';
    };
}

function downloadResult() {
    window.open('/api/download/' + sessionId, '_blank');
}

function stopProcess() {
    fetch('/api/stop/' + sessionId, { method: 'POST' });
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
}

function resetAll() {
    if (eventSource) { eventSource.close(); eventSource = null; }
    fetch('/api/reset', { method: 'POST' });
    sessionId = null;
    document.getElementById('uploadZone').classList.remove('hidden');
    document.getElementById('fileInfo').classList.add('hidden');
    document.getElementById('startBtn').disabled = true;
    document.getElementById('resultCard').classList.add('hidden');
    document.getElementById('downloadBtn').classList.add('hidden');
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('logBox').innerHTML = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('fileInput').value = '';
    loadConfigStatus();
}

function toggleCollapse(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
}

function testLLM(type) {
    const btn = type === 'text' ? document.getElementById('btnTestText') : document.getElementById('btnTestVision');
    const resultEl = type === 'text' ? document.getElementById('testResultText') : document.getElementById('testResultVision');
    btn.disabled = true;
    btn.textContent = '测试中...';
    resultEl.textContent = '';
    resultEl.style.color = '#888';

    var body = {};
    if (type === 'text') {
        body = {
            api_key: document.getElementById('cfgKey').value || '',
            base_url: document.getElementById('cfgUrl').value || '',
            model: document.getElementById('cfgModel').value || '',
        };
    } else {
        body = {
            vision_api_key: document.getElementById('cfgVisionKey').value || '',
            vision_url: document.getElementById('cfgVisionUrl').value || '',
            vision_model: document.getElementById('cfgVision').value || '',
        };
    }
    fetch('/api/test_' + type, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
            btn.disabled = false;
            btn.textContent = type === 'text' ? '测试文本模型' : '测试视觉模型';
            if (data.status === 'ok') {
                resultEl.style.color = '#10b981';
                resultEl.textContent = '✓ ' + data.message + ' → ' + data.reply;
            } else {
                resultEl.style.color = '#ef4444';
                resultEl.textContent = '✗ ' + data.message;
            }
        })
        .catch(e => {
            btn.disabled = false;
            btn.textContent = type === 'text' ? '测试文本模型' : '测试视觉模型';
            resultEl.style.color = '#ef4444';
            resultEl.textContent = '✗ 网络错误';
        });
}

function saveConfig() {
    const keyVal = document.getElementById('cfgKey').value;
    const visionKeyVal = document.getElementById('cfgVisionKey').value;
    const config = {
        base_url: document.getElementById('cfgUrl').value,
        api_key: (keyVal && keyVal !== '***') ? keyVal : '',
        model: document.getElementById('cfgModel').value,
        vision_base_url: document.getElementById('cfgVisionUrl').value,
        vision_api_key: (visionKeyVal && visionKeyVal !== '***') ? visionKeyVal : '',
        vision_model: document.getElementById('cfgVision').value,
    };
    fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) })
        .then(r => r.json())
        .then(data => {
            const info = [];
            if (data.has_text_key) info.push('文本Key:已保存');
            else info.push('文本Key:未设置');
            if (data.has_vision_key) info.push('视觉Key:已保存');
            else info.push('视觉Key:未设置');
            alert('配置已保存\n' + info.join('\n') + '\n\n配置路径:\n' + (data.config_path || ''));
            loadConfigStatus();
        })
        .catch(function(e) {
            alert('保存失败: ' + e);
        });
}

function loadConfigStatus() {
    fetch('/api/config')
        .then(r => r.json())
        .then(cfg => {
            document.getElementById('cfgUrl').value = cfg.base_url || '';
            document.getElementById('cfgModel').value = cfg.model || '';
            document.getElementById('cfgVisionUrl').value = cfg.vision_base_url || '';
            document.getElementById('cfgVision').value = cfg.vision_model || '';
            document.getElementById('cfgKey').placeholder = cfg.api_key ? '已配置，留空保持不变' : '请输入 API Key';
            document.getElementById('cfgVisionKey').placeholder = cfg.vision_api_key ? '已配置，留空保持不变' : '请输入 API Key';
            document.getElementById('keyStatus').textContent = cfg.api_key ? '(已配置)' : '';
            document.getElementById('visionKeyStatus').textContent = cfg.vision_api_key ? '(已配置)' : '';
        })
        .catch(function() { console.log('加载配置失败，可能服务未启动'); });
}

try {
    loadConfigStatus();
} catch(e) { console.log(e); }
</script>
</body>
</html>
